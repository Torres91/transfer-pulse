[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false

[rpc_endpoints]
polygon_mumbai = "${POLYGON_MUMBAI_RPC}"
polygon_mainnet = "${POLYGON_MAINNET_RPC}"

[etherscan]
polygon_mumbai = { key = "${POLYGONSCAN_API_KEY}", chain = 80001 }
polygon_mainnet = { key = "${POLYGONSCAN_API_KEY}", chain = 137 }

[fmt]
line_length = 100
tab_width = 4
